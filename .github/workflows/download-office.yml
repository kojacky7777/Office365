name: Download Office 365

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest

    steps:
      - name: Create ODT folder
        run: mkdir C:\ODT

      - name: Download Office Deployment Tool
        run: |
          Invoke-WebRequest "https://download.microsoft.com/download/2/7/0/270F0C0C-5F5C-4D3A-8E3F-5F6F6D0C6D5C/officedeploymenttool_16426-20258.exe" -OutFile "C:\ODT\odt.exe"
          Start-Process "C:\ODT\odt.exe" -ArgumentList "/quiet /extract:C:\ODT" -Wait

      - name: Create config.xml
        run: |
          Set-Content -Path "C:\ODT\config.xml" -Value @"
<Configuration>
  <Add OfficeClientEdition="64" Channel="Current">
    <Product ID="O365ProPlusRetail">
      <Language ID="ru-ru" />
    </Product>
  </Add>
  <Property Name="SharedComputerLicensing" Value="1" />
  <Property Name="DeviceBasedLicensing" Value="0" />
  <Property Name="AUTOACTIVATE" Value="1" />
  <Updates Enabled="TRUE" Channel="Current" />
  <Property Name="SendTelemetry" Value="0" />
  <ExcludeApp ID="Teams" />
</Configuration>
"@

      - name: Download Office
        run: |
          C:\ODT\setup.exe /download C:\ODT\config.xml

      - name: Archive Office folder
        run: |
          Compress-Archive -Path C:\ODT\Office -DestinationPath C:\office.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: office365
          path: C:\office.zip
